services:
  brcprint_mysql_prod:
    image: mysql:8.0
    container_name: brcprint_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-brcprint_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-brcprint_db}
      MYSQL_USER: ${MYSQL_USER:-brcprint_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-brcprint_pass123}
    # Porta 3306 oculta para o host externo por segurança
    volumes:
      - brcprint_mysql_prod_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./db/migrate_phase2.sql:/docker-entrypoint-initdb.d/02_migrate.sql
      - ./db/migrate_phase9.sql:/docker-entrypoint-initdb.d/03_migrate.sql
      - ./db/migrate_phase10.sql:/docker-entrypoint-initdb.d/04_migrate.sql
      - ./db/migrate_phase14.sql:/docker-entrypoint-initdb.d/05_migrate.sql
      - ./db/migrate_smtp.sql:/docker-entrypoint-initdb.d/06_migrate.sql
      - ./db/migrate_phase_config.sql:/docker-entrypoint-initdb.d/07_migrate.sql
      - ./db/migrate_whatsapp_config.sql:/docker-entrypoint-initdb.d/08_migrate.sql
      - ./db/migrate_multi_upload.sql:/docker-entrypoint-initdb.d/09_migrate.sql
      - ./db/migrate_infill.sql:/docker-entrypoint-initdb.d/10_migrate.sql
      - ./db/migrate_printer_maintenance.sql:/docker-entrypoint-initdb.d/11_migrate.sql
      - ./db/migrate_shipping.sql:/docker-entrypoint-initdb.d/12_migrate.sql
      - ./db/migrate_coupons.sql:/docker-entrypoint-initdb.d/13_migrate.sql
      - ./db/migrate_packaging.sql:/docker-entrypoint-initdb.d/14_migrate.sql
      - ./db/migrate_catalog.sql:/docker-entrypoint-initdb.d/15_migrate.sql
      - ./db/migrate_expenses.sql:/docker-entrypoint-initdb.d/16_migrate.sql
      - ./db/migrate_affiliates.sql:/docker-entrypoint-initdb.d/17_migrate.sql
      - ./db/migrate_consumables.sql:/docker-entrypoint-initdb.d/18_migrate.sql
      - ./db/migrate_maintenance_v2.sql:/docker-entrypoint-initdb.d/19_migrate.sql
      - ./db/migrate_b2b_subscriptions.sql:/docker-entrypoint-initdb.d/20_migrate.sql
      - ./db/migrate_b2b_filament.sql:/docker-entrypoint-initdb.d/21_migrate.sql
      - ./db/migrate_pix.sql:/docker-entrypoint-initdb.d/22_migrate.sql
      - ./db/migrate_mp.sql:/docker-entrypoint-initdb.d/23_migrate.sql
      - ./db/migrate_roles.sql:/docker-entrypoint-initdb.d/24_migrate.sql
      - ./db/migrate_phase52.sql:/docker-entrypoint-initdb.d/25_migrate.sql
      - ./db/migrate_phase53.sql:/docker-entrypoint-initdb.d/26_migrate.sql
      - ./db/migrate_phase54.sql:/docker-entrypoint-initdb.d/27_migrate.sql
      - ./db/migrate_phase60.sql:/docker-entrypoint-initdb.d/28_migrate.sql
      - ./db/migrate_phase65_multicolor.sql:/docker-entrypoint-initdb.d/29_migrate.sql
      - ./db/migrate_phase66_maintenance.sql:/docker-entrypoint-initdb.d/30_migrate.sql
      - ./db/migrate_phase67_digital.sql:/docker-entrypoint-initdb.d/31_migrate.sql
      - ./db/migrate_phase68_title.sql:/docker-entrypoint-initdb.d/32_migrate.sql
      - ./db/migrate_phase94_filaments.sql:/docker-entrypoint-initdb.d/33_migrate.sql
      - ./db/migrate_phase95_traceability.sql:/docker-entrypoint-initdb.d/34_migrate.sql
      - ./db/migrate_phase96_consumables_traceability.sql:/docker-entrypoint-initdb.d/35_migrate.sql
      - ./db/migrate_phase97_filament_lots_traceability.sql:/docker-entrypoint-initdb.d/36_migrate.sql
      - ./db/migrate_phase103_config_lengths_fix.sql:/docker-entrypoint-initdb.d/37_migrate.sql
      - ./db/migrate_missing_config_cols.sql:/docker-entrypoint-initdb.d/38_migrate.sql
      - ./db/add_missing_columns.sql:/docker-entrypoint-initdb.d/39_migrate.sql
      - ./db/migrate_parametric_models.sql:/docker-entrypoint-initdb.d/40_migrate.sql
      - ./db/migrate_upsells.sql:/docker-entrypoint-initdb.d/41_migrate.sql
      - ./db/migrate_reference_images.sql:/docker-entrypoint-initdb.d/42_migrate.sql
      - ./db/migrate_manual_quote.sql:/docker-entrypoint-initdb.d/43_migrate.sql
      - ./db/migrate_cart_orders.sql:/docker-entrypoint-initdb.d/44_migrate.sql
      - ./db/migrate_sla.sql:/docker-entrypoint-initdb.d/45_migrate.sql
      - ./db/migrate_reviews.sql:/docker-entrypoint-initdb.d/46_migrate.sql
      - ./db/migrate_ai_settings.sql:/docker-entrypoint-initdb.d/47_migrate.sql
    networks:
      - brcprint_prod_network
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-brcprint_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  brcprint_app_prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: brcprint_app_prod
    restart: always
    # A porta 3000 não é mais exposta diretamente para a internet. O tráfego vem pelo Caddy.
    environment:
      # O banco na rede Docker usa o nome do container:
      DATABASE_URL: "mysql://${DB_USER:-brcprint_user}:${DB_PASSWORD:-brcprint_pass123}@brcprint_mysql_prod:3306/${DB_NAME:-brcprint_db}"
      # Sobrescreve explicitamente o host para evitar conflito com o .env do ambiente de dev
      DB_HOST: brcprint_mysql_prod
      DB_PORT: "3306"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-your-secret-key-for-next-auth-change-in-prod}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-sk_test_123}" # Sobrescrever em .env na raiz
      SCAD_API_URL: "http://scad:3006"
      SLICER_API_URL: "http://slicer:3005"
    depends_on:
      brcprint_mysql_prod:
        condition: service_healthy # Aguarda o Mysql ficar saudável antes de dar boot no Node
    volumes:
      - brcprint_prod_uploads:/app/public/uploads
      - brcprint_prod_outputs:/app/public/outputs
    networks:
      - brcprint_prod_network

  nginx:
    image: nginx:1.25-alpine
    container_name: brcprint_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - brcprint_prod_uploads:/var/www/uploads
      - brcprint_prod_outputs:/var/www/outputs
    depends_on:
      - brcprint_app_prod
    networks:
      - brcprint_prod_network

  certbot:
    image: certbot/certbot
    container_name: brcprint_certbot
    restart: always
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # The command will be overridden by the bootstrap script for the first run,
    # but for continuous renewal we use this:
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"


  slicer:
    build:
      context: ./slicer-api
    container_name: brcprint_slicer_prod
    restart: always
    # Porta interna 3005 oculta
    networks:
      - brcprint_prod_network
    volumes:
      - brcprint_prod_outputs:/app/outputs

  scad:
    build:
      context: ./scad-api
    container_name: brcprint_scad_prod
    restart: always
    networks:
      - brcprint_prod_network
    volumes:
      - brcprint_prod_outputs:/app/outputs

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: brcprint_phpmyadmin_prod
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=brcprint_mysql_prod
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      brcprint_mysql_prod:
        condition: service_healthy
    networks:
      - brcprint_prod_network

  auction_bot:
    image: node:20-alpine
    container_name: brcprint_auction_bot_prod
    restart: always
    command: >
      sh -c '
      echo "Bot Iniciado - Pinging /api/cron/auction-bots every 3s" &&
      while true; do
        wget -qO- http://brcprint_app_prod:3000/api/cron/auction-bots > /dev/null 2>&1 || true;
        sleep 3;
      done
      '
    depends_on:
      - brcprint_app_prod
    networks:
      - brcprint_prod_network

volumes:
  brcprint_mysql_prod_data:
  brcprint_prod_uploads:
  brcprint_prod_outputs:
  slicer_data:


networks:
  brcprint_prod_network:
    driver: bridge
