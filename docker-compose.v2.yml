services:
  # ─── Banco de Dados Principal (MySQL — mantido) ────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: brcprint_mysql_v2
    restart: unless-stopped
    env_file:
      - .env.v2
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: brcprint_db
      MYSQL_USER: brcprint_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - brcprint_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Banco de Dados Evolution API (PostgreSQL exclusivo) ──────────────────
  postgres_evolution:
    image: postgres:16-alpine
    container_name: brcprint_postgres_evolution
    restart: unless-stopped
    env_file:
      - .env.v2
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_DB_PASSWORD}
    volumes:
      - postgres_evolution_data:/var/lib/postgresql/data
    networks:
      - brcprint_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── MinIO (Armazenamento de Objetos S3-Compatible) ───────────────────────
  minio:
    image: minio/minio:latest
    container_name: brcprint_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - .env.v2
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - brcprint_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ─── MinIO Init (cria buckets na inicialização) ───────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: brcprint_minio_init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env.v2
    entrypoint: >
      /bin/sh -c "
      mc alias set brcminio http://minio:9000 $${MINIO_USER} $${MINIO_PASSWORD};
      mc mb --ignore-existing brcminio/stl-files;
      mc mb --ignore-existing brcminio/gcodes;
      mc mb --ignore-existing brcminio/images;
      mc mb --ignore-existing brcminio/avatars;
      mc mb --ignore-existing brcminio/documents;
      mc anonymous set download brcminio/images;
      mc anonymous set download brcminio/avatars;
      echo 'MinIO buckets OK';
      exit 0;
      "
    networks:
      - brcprint_net

  # ─── Redis (Cache + Filas) ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: brcprint_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - brcprint_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Evolution API (WhatsApp) ─────────────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    container_name: brcprint_evolution
    restart: unless-stopped
    env_file:
      - .env.v2
    environment:
      SERVER_URL: http://localhost:8080
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:${EVOLUTION_DB_PASSWORD}@postgres_evolution:5432/evolution_db
      DATABASE_CONNECTION_CLIENT_NAME: evolution_v2
      RABBITMQ_ENABLED: "false"
      REDIS_ENABLED: "true"
      REDIS_URI: redis://redis:6379
      REDIS_PREFIX_KEY: evolution
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: pt-BR
    ports:
      - "8080:8080"
    depends_on:
      postgres_evolution:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brcprint_net
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brcprint_fastapi
    restart: unless-stopped
    env_file:
      - .env.v2
    environment:
      DATABASE_URL: mysql+aiomysql://brcprint_user:${DB_PASSWORD}@mysql:3306/brcprint_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_SECURE: "false"
      REDIS_URL: redis://redis:6379
      EVOLUTION_API_URL: http://evolution:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      SLICER_API_URL: http://slicer:3005
      SCAD_API_URL: http://scad:3006
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brcprint_net
    volumes:
      - ./backend:/app
      - /app/__pycache__

  # ─── Slicer API v2 (Bambu Studio CLI) ────────────────────────────────────
  slicer:
    build:
      context: ./slicer-api-v2
      dockerfile: Dockerfile
    container_name: brcprint_slicer_v2
    restart: unless-stopped
    ports:
      - "3005:3005"
    networks:
      - brcprint_net
    volumes:
      - ./public/outputs:/app/outputs
    environment:
      PORT: "3005"

  # ─── SCAD API (mantido) ───────────────────────────────────────────────────
  scad:
    build:
      context: ./scad-api
      dockerfile: Dockerfile
    container_name: brcprint_scad
    restart: unless-stopped
    ports:
      - "3006:3006"
    networks:
      - brcprint_net
    volumes:
      - ./public/uploads/custom_scads:/app/outputs

  # ─── Auction Bot ──────────────────────────────────────────────────────────
  auction_bot:
    image: node:20-alpine
    container_name: brcprint_auction_bot_v2
    restart: unless-stopped
    command: >
      sh -c '
      echo "Auction Bot v2 - Pinging FastAPI /api/v1/cron/auction every 3s" &&
      while true; do
        wget -qO- http://fastapi:8000/api/v1/cron/auction-bots > /dev/null 2>&1 || true;
        sleep 3;
      done
      '
    depends_on:
      - fastapi
    networks:
      - brcprint_net

  # ─── Astro.js Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brcprint_frontend
    restart: unless-stopped
    env_file:
      - .env.v2
    environment:
      API_URL: http://fastapi:8000
      PUBLIC_API_URL: /api
      NODE_ENV: production
    ports:
      - "4321:4321"
    depends_on:
      - fastapi
    networks:
      - brcprint_net

  # ─── Nginx (Reverse Proxy) ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: brcprint_nginx_v2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/v2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./public/uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - fastapi
    networks:
      - brcprint_net

  # ─── phpMyAdmin (mantido para gestão do MySQL) ───────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: brcprint_phpmyadmin_v2
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - brcprint_net

volumes:
  mysql_data:
  postgres_evolution_data:
  minio_data:
  redis_data:
  evolution_instances:
  evolution_store:

networks:
  brcprint_net:
    driver: bridge
