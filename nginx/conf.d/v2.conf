server {
    listen 80;
    server_name brcprint.com.br www.brcprint.com.br;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name brcprint.com.br www.brcprint.com.br;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/brcprint.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brcprint.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100M;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # ── Astro.js Frontend (raiz do site) ──────────────────────────────────
    location / {
        proxy_pass http://brcprint_frontend:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # ── FastAPI Backend ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://brcprint_fastapi:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # ── FastAPI Docs (apenas em dev — remover em prod) ────────────────────
    location /docs {
        proxy_pass http://brcprint_fastapi:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://brcprint_fastapi:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Uploads / Outputs estáticos ───────────────────────────────────────
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires max;
        add_header Cache-Control public;
    }

    location /outputs/ {
        alias /var/www/outputs/;
        access_log off;
        expires max;
        add_header Cache-Control public;
    }
}
