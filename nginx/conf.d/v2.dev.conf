server {
    listen 80;
    server_name localhost;

    client_max_body_size 100M;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # ── FastAPI Backend ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://brcprint_fastapi:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    # ── FastAPI Swagger Docs ───────────────────────────────────────────────
    location /docs {
        proxy_pass http://brcprint_fastapi:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://brcprint_fastapi:8000/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://brcprint_fastapi:8000/redoc;
        proxy_set_header Host $host;
    }

    # ── Astro.js Frontend ─────────────────────────────────────────────────
    location / {
        proxy_pass http://brcprint_frontend:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static files ──────────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
    }
}
